name: keep-alive
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Keep couch-ops awake
        run: |
          for i in 1 2 3 4 5; do
            curl -sS -m 120 -o /dev/null -w "ping $i -> HTTP %{http_code} in %{time_total}s\n" https://couch-ops.onrender.com/ || true
            sleep 50
          done
